# 案例: Java 应用 OOMKilled 导致 Pod 重启

## 背景

- **环境**: 生产环境 Kubernetes 集群
- **服务**: 用户中心服务 (Java Spring Boot)
- **规模**: 50+ Pods，QPS ~5000

## 现象

```
Status: CrashLoopBackOff
Restart Count: 15
Last State: Terminated
  Exit Code: 137
  Reason: OOMKilled
  Started: 2024-01-15T10:23:45Z
  Finished: 2024-01-15T10:25:12Z
```

## 诊断过程

### Step 1: 检查资源限制

```bash
$ kubectl get pod user-center-7d9f8b6c5-xyz -o jsonpath='{.spec.containers[0].resources}'

{
  "limits": {"cpu": "500m", "memory": "512Mi"},
  "requests": {"cpu": "200m", "memory": "256Mi"}
}
```

**发现**: Memory Limit 只有 512Mi，对于 Java 应用来说太小

### Step 2: 检查 JVM 配置

```bash
$ kubectl exec user-center-7d9f8b6c5-xyz -- env | grep JAVA
JAVA_OPTS=-Xmx256m -Xms256m
```

**问题**: JVM heap 设置为 256m，加上 Metaspace、Direct Memory、Native Memory，总内存远超 512Mi

### Step 3: 查看 GC 日志

```bash
$ kubectl logs user-center-7d9f8b6c5-xyz --previous | grep -i "gc"
2024-01-15T10:24:01.123Z: Full GC took 2000ms, heap before: 240M, heap after: 235M
2024-01-15T10:24:03.456Z: Full GC took 2500ms, heap before: 238M, heap after: 230M
...
```

**确认**: 频繁 Full GC，内存压力严重

## 根因分析

1. **内存限制不合理**: 512Mi 对于 Java 应用太紧
2. **JVM 参数未优化**: 默认 256m heap 在高并发下不够
3. **缺少告警**: OOM 前没有及时发现

## 解决方案

### 临时方案 (5分钟)

```bash
# 1. 提高内存限制到 2Gi
kubectl patch deployment user-center -p '{
  "spec": {
    "template": {
      "spec": {
        "containers": [{
          "name": "user-center",
          "resources": {
            "limits": {"memory": "2Gi", "cpu": "1000m"},
            "requests": {"memory": "1Gi", "cpu": "500m"}
          }
        }]
      }
    }
  }
}'

# 2. 滚动更新
kubectl rollout status deployment user-center
```

### 长期方案

1. **优化 JVM 参数**:
   ```yaml
   env:
   - name: JAVA_OPTS
     value: "-Xmx1536m -Xms512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
   ```

2. **添加 Pod Disruption Budget** 避免同时重启多个 Pod

3. **添加 Vertical Pod Autoscaler (VPA)** 自动调整资源

4. **配置 Prometheus 告警规则**:
   ```yaml
   - alert: PodOOMKilled
     expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
     for: 1m
     labels:
       severity: critical
   ```

## 结果

| 指标 | 优化前 | 优化后 |
|------|--------|--------|
| Pod 重启次数 | 15次/小时 | 0次/小时 |
| 内存使用 | 98% | 65% |
| Full GC 频率 | 5次/分钟 | <1次/分钟 |
| P99 延迟 | 2300ms | 150ms |

## 教训总结

1. **Java 应用内存限制要留有余量**: JVM heap < 50% 的 limit
2. **JVM 参数要和 K8s 资源限制匹配**
3. **添加 OOMKilled 告警，提前发现问题**
4. **VPA 是解决此类问题的自动化方案**
