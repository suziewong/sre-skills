<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRE Skills - 双11 Todo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: #0d1117;
  color: #e6edf3;
  min-height: 100vh;
  padding: 40px 20px;
}

.container {
  max-width: 800px;
  margin: 0 auto;
}

header {
  margin-bottom: 40px;
}

h1 {
  font-size: 28px;
  font-weight: 700;
  color: #58a6ff;
  margin-bottom: 8px;
}

.sub {
  color: #8b949e;
  font-size: 14px;
}

.meta {
  display: flex;
  gap: 20px;
  margin-top: 12px;
  font-size: 13px;
  color: #8b949e;
}

.meta span {
  background: #21262d;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid #30363d;
}

.add-form {
  display: flex;
  gap: 8px;
  margin-bottom: 30px;
}

.add-form input {
  flex: 1;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 12px 16px;
  color: #e6edf3;
  font-size: 14px;
  outline: none;
}

.add-form input:focus {
  border-color: #58a6ff;
  box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
}

.add-form button {
  background: #238636;
  border: none;
  border-radius: 8px;
  padding: 12px 20px;
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}

.add-form button:hover {
  background: #2ea043;
}

.section-title {
  font-size: 14px;
  font-weight: 600;
  color: #8b949e;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
  padding-left: 4px;
}

.todo-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 8px;
  transition: all 0.2s;
}

.todo-item:hover {
  border-color: #8b949e;
}

.todo-item.done {
  opacity: 0.5;
}

.todo-item.done .todo-text {
  text-decoration: line-through;
  color: #8b949e;
}

.checkbox {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid #30363d;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.checkbox.checked {
  background: #238636;
  border-color: #238636;
}

.checkbox.checked::after {
  content: "✓";
  color: #fff;
  font-size: 12px;
  font-weight: 700;
}

.todo-text {
  flex: 1;
  font-size: 14px;
  line-height: 1.5;
  cursor: pointer;
}

.delete-btn {
  background: none;
  border: none;
  color: #8b949e;
  cursor: pointer;
  font-size: 16px;
  padding: 4px 8px;
  border-radius: 4px;
  opacity: 0;
  transition: all 0.2s;
}

.todo-item:hover .delete-btn {
  opacity: 1;
}

.delete-btn:hover {
  color: #f85149;
  background: rgba(248,81,73,0.1);
}

.stats {
  display: flex;
  gap: 20px;
  margin-top: 30px;
  padding: 16px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  font-size: 13px;
  color: #8b949e;
}

.stats strong {
  color: #e6edf3;
}

footer {
  margin-top: 40px;
  text-align: center;
  font-size: 12px;
  color: #484f58;
}

#confetti {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 999;
}
</style>
</head>
<body>

<div id="confetti"></div>

<div class="container">
  <header>
    <h1>SRE Skills · 双11 Todo</h1>
    <p class="sub">监控平台自动分析 · 开源 SRE 技能库</p>
    <div class="meta">
      <span>📅 双11截止：2026-11-11</span>
      <span>🔗 <a href="https://github.com/suziewong/sre-skills" target="_blank" style="color:#58a6ff;text-decoration:none">GitHub</a></span>
      <span>📁 本地：C:\Users\Administrator\.workbuddy\sre-skills\</span>
    </div>
  </header>

  <div class="add-form">
    <input id="input" placeholder="添加新任务... 按回车添加" autocomplete="off">
    <button onclick="addTodo()">添加</button>
  </div>

  <div class="section-title">待办 · <span id="pending-count">0</span> 项</div>
  <div id="pending-list"></div>

  <div class="section-title" style="margin-top: 30px;">已完成 · <span id="done-count">0</span> 项</div>
  <div id="done-list"></div>

  <div class="stats">
    <span>总计 <strong id="total-count">0</strong> 项</span>
    <span>完成率 <strong id="progress">0%</strong></span>
    <span><button onclick="clearDone()" style="background:#21262d;border:1px solid #30363d;color:#8b949e;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px">清除已完成</button></span>
  </div>

  <footer>
    SRE Skills · 双11交付 · Felix（胡喜/京东CTO）<br>
    <a href="https://github.com/suziewong/sre-skills" target="_blank" style="color:#484f58">github.com/suziewong/sre-skills</a>
  </footer>
</div>

<script>
const STORAGE_KEY = 'sre-skills-todos-v2';

function getTodos() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch { return []; }
}

function saveTodos(todos) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
}

function render() {
  const todos = getTodos();
  const pending = todos.filter(t => !t.done);
  const done = todos.filter(t => t.done);

  document.getElementById('pending-count').textContent = pending.length;
  document.getElementById('done-count').textContent = done.length;
  document.getElementById('total-count').textContent = todos.length;
  document.getElementById('progress').textContent =
    todos.length ? Math.round(done.length / todos.length * 100) + '%' : '0%';

  document.getElementById('pending-list').innerHTML = pending.map(t => itemHTML(t)).join('');
  document.getElementById('done-list').innerHTML = done.map(t => itemHTML(t)).join('');
}

function itemHTML(t) {
  return `<div class="todo-item ${t.done ? 'done' : ''}">
    <div class="checkbox ${t.done ? 'checked' : ''}" onclick="toggle(${t.id})"></div>
    <div class="todo-text" onclick="toggle(${t.id})">${escape(t.text)}</div>
    <button class="delete-btn" onclick="del(${t.id})">✕</button>
  </div>`;
}

function escape(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function addTodo() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  const todos = getTodos();
  todos.unshift({ id: Date.now(), text, done: false });
  saveTodos(todos);
  input.value = '';
  render();
}

document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTodo();
});

function toggle(id) {
  const todos = getTodos();
  const t = todos.find(t => t.id === id);
  if (t) {
    t.done = !t.done;
    saveTodos(todos);
    render();
  }
}

function del(id) {
  const todos = getTodos().filter(t => t.id !== id);
  saveTodos(todos);
  render();
}

function clearDone() {
  const todos = getTodos().filter(t => !t.done);
  saveTodos(todos);
  render();
}

// Init
render();
</script>
</body>
</html>
